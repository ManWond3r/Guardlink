<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GuardLink - Complaints</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <div class="nav-brand" onclick="window.location.href='dashboard.html'">Guard<span>Link</span></div>
      <div class="nav-tag">Admin Portal</div>
    </div>
    <div class="nav-right">
      <div class="nav-user">Signed in as <span id="adminName">Admin</span></div>
      <label class="toggle-switch" title="Toggle theme">
        <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb" id="toggleIcon">☀️</div>
      </label>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Complaints</div>
        <div class="gold-divider"></div>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" onclick="window.location.href='dashboard.html'">← Back</button>
      </div>
    </div>

    <!-- Filter by status -->
    <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <input type="text" id="searchInput" placeholder="Search by client or message..."
        oninput="filterComplaints()"
        style="width:100%;max-width:300px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;" />
      <select id="statusFilter" onchange="filterComplaints()"
        style="background:var(--input-bg);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;">
        <option value="">All Statuses</option>
        <option value="open">Open</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>

    <div class="table-wrap">
      <div class="empty-state" id="emptyState">Loading complaints...</div>
      <table class="data-table" id="complaintsTable" style="display:none">
        <thead>
          <tr>
            <th>Client</th>
            <th>Message</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="complaintsBody"></tbody>
      </table>
    </div>

    <!-- Reply Modal -->
    <div id="replyModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:32px;width:100%;max-width:520px;margin:20px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--text);margin-bottom:8px;">Reply to Complaint</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px;" id="replyClientName"></div>
        <div style="background:var(--card-hover);border-radius:4px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--text);font-style:italic;" id="replyOriginalMsg"></div>
        <textarea id="replyText" rows="4" placeholder="Type your reply..."
          style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;padding:12px 16px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;resize:vertical;margin-bottom:16px;"></textarea>
        <div style="display:flex;gap:12px;">
          <button class="btn-primary" onclick="sendReply()" id="replyBtn">Send Reply</button>
          <button class="btn-secondary" onclick="closeReplyModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="layout.js"></script>
  <script>
    let allComplaints = [];
    let currentReplyId = null;

    async function loadComplaints() {
      try {
        const res = await apiFetch("/api/complaints");
        allComplaints = await res.json();
        renderComplaints(allComplaints);
      } catch (err) {
        document.getElementById("emptyState").textContent = "Error loading complaints.";
      }
    }

    function filterComplaints() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const status = document.getElementById("statusFilter").value;
      const filtered = allComplaints.filter(c => {
        const matchesText = (c.client_name || "").toLowerCase().includes(query) ||
          c.message.toLowerCase().includes(query);
        const matchesStatus = status ? c.status === status : true;
        return matchesText && matchesStatus;
      });
      renderComplaints(filtered);
    }

    function renderComplaints(complaints) {
      const tbody = document.getElementById("complaintsBody");
      const empty = document.getElementById("emptyState");
      const table = document.getElementById("complaintsTable");

      if (complaints.length === 0) {
        empty.textContent = "No complaints found.";
        empty.style.display = "block";
        table.style.display = "none";
        return;
      }

      empty.style.display = "none";
      table.style.display = "table";
      tbody.innerHTML = "";

      complaints.forEach(complaint => {
        const badgeClass = complaint.status === "resolved" ? "badge-resolved" : "badge-open";
        const toggleText = complaint.status === "resolved" ? "Mark Open" : "Mark Resolved";
        const newStatus = complaint.status === "resolved" ? "open" : "resolved";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${complaint.client_name || "—"}</td>
          <td>${complaint.message}</td>
          <td><span class="${badgeClass}">${complaint.status}</span></td>
          <td>${new Date(complaint.created_at).toLocaleDateString()}</td>
          <td style="white-space:nowrap;">
            <button class="btn-action" onclick="openReplyModal('${complaint.id}', '${complaint.client_name}', \`${complaint.message.replace(/`/g, "'")}\`)">Reply</button>
            <span style="color:var(--border);margin:0 4px;">|</span>
            <button class="btn-action" onclick="toggleStatus('${complaint.id}', '${newStatus}')">${toggleText}</button>
            <span style="color:var(--border);margin:0 4px;">|</span>
            <button class="btn-action" style="color:var(--error-text)" onclick="deleteComplaint('${complaint.id}')">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function openReplyModal(id, clientName, message) {
      currentReplyId = id;
      document.getElementById("replyClientName").textContent = `Client: ${clientName}`;
      document.getElementById("replyOriginalMsg").textContent = `"${message}"`;
      document.getElementById("replyText").value = "";
      document.getElementById("replyModal").style.display = "flex";
    }

    function closeReplyModal() {
      document.getElementById("replyModal").style.display = "none";
      currentReplyId = null;
    }

    async function sendReply() {
      const reply = document.getElementById("replyText").value.trim();
      if (!reply) return;

      const btn = document.getElementById("replyBtn");
      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const res = await apiFetch(`/api/complaints/${currentReplyId}/reply`, {
          method: "POST",
          body: JSON.stringify({ reply })
        });

        if (res.ok) {
          closeReplyModal();
          loadComplaints();
        } else {
          const data = await res.json();
          alert(data.error || "Failed to send reply.");
        }
      } catch (err) {
        alert("Could not connect to server.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Send Reply";
      }
    }

    async function toggleStatus(id, newStatus) {
      try {
        const res = await apiFetch(`/api/complaints/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) loadComplaints();
      } catch (err) {
        alert("Failed to update status.");
      }
    }

    async function deleteComplaint(id) {
      if (!confirm("Are you sure you want to delete this complaint?")) return;
      try {
        const res = await apiFetch(`/api/complaints/${id}`, { method: "DELETE" });
        if (res.ok) {
          loadComplaints();
        } else {
          const data = await res.json();
          alert(data.error || "Failed to delete complaint.");
        }
      } catch (err) {
        alert("Could not connect to server.");
      }
    }

    loadComplaints();
  </script>
</body>
</html>
